linux-arm64-debian10:
  name: Linux ARM64 Debian10 Compatible
  runs-on: ubuntu-22.04-arm

  container:
    image: arm64v8/debian:buster

  steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: |
        apt-get update

        apt-get install -y \
          build-essential \
          curl \
          wget \
          git \
          pkg-config \
          file \
          python3 \
          ca-certificates

    - name: Install GTK
      run: |
        apt-get install -y \
          libgtk-3-dev \
          libsoup2.4-dev \
          libssl-dev

    - name: Install NodeJS 20
      run: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs

    - name: Install pnpm
      run: |
        npm install -g pnpm

    - name: Install Rust
      run: |
        curl https://sh.rustup.rs -sSf | sh -s -- -y

        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Rust Version
      run: |
        rustc -V
        cargo -V

    - name: Install Frontend Dependencies
      run: |
        pnpm install --frozen-lockfile

    - name: Build
      env:
        CI: true
      run: |
        source $HOME/.cargo/env

        pnpm tauri build \
          --target aarch64-unknown-linux-gnu \
          --bundles deb

    - name: Verify GLIBC
      run: |
        BIN=$(find src-tauri/target -type f -executable | head -1)

        echo "===== REQUIRED GLIBC ====="
        strings "$BIN" | grep GLIBC_ | sort -u

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-arm64-debian10
        path: |
          src-tauri/target/**/bundle/**/*.deb
